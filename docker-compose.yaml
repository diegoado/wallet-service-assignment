services:
  postgres:
    image: postgres:16-alpine
    container_name: wallet-db
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: p@ssw0rd
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wallet-network

  redis:
    image: redis:8.6-alpine
    container_name: wallet-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - wallet-network

  wallet:
    build: .
    container_name: wallet-service
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: wallet
      DB_USERNAME: wallet
      DB_PASSWORD: p@ssw0rd
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - wallet-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  wallet-network:
    driver: bridge
