#file: noinspection YAMLSchemaValidation
server:
  port: ${PORT:8080}

spring:
  application:
    name: wallet-service-assignment
  config:
    import: classpath:spring-error-handling.yaml
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: org.postgresql.Driver
    hikari:
      schema: ${DB_SCHEMA:public}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT:5000}
      max-lifetime: ${DB_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD:60000}
      connection-test-query: select 1
      minimum-idle: ${DB_MIN_IDLE:2}
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      pool-name: springHikariPool
      auto-commit: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          fetch_size: 200
          batch_size: 50
          batch_versioned_data: true
          lob:
            non_contextual_creation: true
        connection:
          provider_disables_autocommit: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: ${DB_SCHEMA:public}
        default_batch_fetch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: true
        use_sql_comments: true
        current_session_context_class: thread

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  endpoint:
    shutdown:
      access: none
    health:
      probes:
        enabled: true
      show-details: never
      show-components: always
      group:
        startup:
          include: [ livenessState ]
        liveness:
          include: [ livenessState, diskSpace, ping ]
        readiness:
          include: [ readinessState, db ]
  endpoints:
    web:
      exposure:
        include: info,health,metrics
  otlp:
    metrics:
      export:
        step: ${OTEL_METRIC_EXPORT_INTERVAL:10000}
        aggregation-temporality: ${OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE:delta}
        histogram-flavor: ${OTEL_EXPORTER_OTLP_METRICS_DEFAULT_HISTOGRAM_AGGREGATION:base2_exponential_bucket_histogram}
  observations:
    annotations:
      enabled: true
  opentelemetry:
    tracing:
      export:
        include-unsampled: false
        schedule-delay: ${OTEL_BSP_SCHEDULE_DELAY:5000}
